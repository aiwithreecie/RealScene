<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RealScene | Prompt Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0c;
            color: #e5e5e5;
        }
        .glass {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .output-box {
            background: #141416;
            border: 1px solid #2a2a2d;
        }
        .tag {
            background: #1f1f23;
            border: 1px solid #333;
        }
        .generate-btn {
            background: #fff;
            color: #000;
            font-weight: 600;
        }
        .generate-btn:hover {
            background: #ddd;
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <div class="max-w-4xl mx-auto space-y-6">
        
        <div class="text-center space-y-2 mb-8">
            <h1 class="text-3xl font-light">RealScene</h1>
            <p class="text-gray-500 text-sm">Paste your full creative direction. The generator will enhance it, not replace it.</p>
        </div>

        <div class="glass rounded-2xl p-6 space-y-4">
            <label class="block text-sm font-medium text-gray-400">Your creative direction (paste everything - subject, makeup, hair, mood, palette):</label>
            <textarea 
                id="input" 
                rows="8"
                placeholder="Ebony goddess, Aesthetic metalsmith femininity — industrial deconstruction meets gothic romanticism...

Makeup Direction: zero-foundation skin with visible texture...
Hair Direction: wet-look slicked back...
Palette: cold steel grey, bone white..."
                class="w-full bg-black/40 border border-white/10 rounded-xl p-4 text-white placeholder-gray-600 focus:outline-none focus:border-white/30 resize-none font-mono text-sm"
            ></textarea>
            <button onclick="buildPrompt()" class="generate-btn w-full py-3 rounded-xl">
                Build Prompt
            </button>
        </div>

        <div id="results" class="hidden space-y-4">
            
            <div class="output-box rounded-2xl p-6">
                <div class="flex justify-between items-center mb-4 pb-4 border-b border-white/10">
                    <span class="text-xs text-gray-500 uppercase">Enhanced Prompt</span>
                    <button onclick="copyToClipboard()" class="text-xs text-gray-400 hover:text-white flex items-center gap-2" id="copyBtn">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path>
                        </svg>
                        Copy
                    </button>
                </div>
                <textarea id="output" readonly class="w-full bg-transparent border-none resize-none text-sm leading-relaxed text-gray-300 focus:outline-none" rows="10"></textarea>
            </div>

            <div class="grid md:grid-cols-2 gap-4 text-sm">
                <div class="glass rounded-xl p-4">
                    <h3 class="text-xs text-gray-500 uppercase mb-3">What You Provided</h3>
                    <div id="userTags" class="flex flex-wrap gap-2"></div>
                </div>
                <div class="glass rounded-xl p-4">
                    <h3 class="text-xs text-gray-500 uppercase mb-3">What Was Added</h3>
                    <div id="addedTags" class="flex flex-wrap gap-2"></div>
                </div>
            </div>

        </div>

    </div>

    <script>
        function analyzeInput(input) {
            const lower = input.toLowerCase();
            
            // Check if user already specified location
            const locationKeywords = {
                'bedroom': ['bed', 'bedroom', 'boudoir'],
                'kitchen': ['kitchen', 'cooking', 'culinary'],
                'workshop': ['workshop', 'studio', 'forge', 'industrial', 'metal', 'metalsmith'],
                'outdoor': ['outdoor', 'garden', 'street', 'alley'],
                'bathroom': ['bathroom', 'bath'],
                'office': ['office', 'desk'],
                'gym': ['gym', 'fitness'],
                'living room': ['couch', 'sofa', 'living room']
            };
            
            let detectedLocation = null;
            for (const [location, keywords] of Object.entries(locationKeywords)) {
                if (keywords.some(k => lower.includes(k))) {
                    detectedLocation = location;
                    break;
                }
            }
            
            // Check if user specified outfit/wardrobe
            const hasWardrobe = lower.includes('wearing') || lower.includes('dressed') || lower.includes('outfit') || 
                               lower.includes('shirt') || lower.includes('dress') || lower.includes('pants') || 
                               lower.includes('jacket') || lower.includes('gown') || lower.includes('suit');
            
            // Check if user specified pose/activity
            const hasPose = lower.includes('standing') || lower.includes('sitting') || lower.includes('leaning') || 
                           lower.includes('holding') || lower.includes('working') || lower.includes('posing');
            
            return { detectedLocation, hasWardrobe, hasPose };
        }

        function buildPrompt() {
            const input = document.getElementById('input').value.trim();
            if (!input) return;

            const analysis = analyzeInput(input);
            
            // Start with user's exact text as the base
            let prompt = input;
            
            // Clean up the input - replace newlines with commas for flow
            prompt = prompt.replace(/\n+/g, ', ').replace(/,+/g, ',').replace(/,\s*,/g, ',');
            
            const addedElements = [];
            
            // Only add location if user didn't specify one
            if (!analysis.detectedLocation) {
                // Default based on aesthetic keywords
                if (input.toLowerCase().includes('industrial') || input.toLowerCase().includes('metal')) {
                    prompt += ', in industrial metal workshop, concrete floors, exposed brick, welding equipment, steel beams';
                    addedElements.push('industrial workshop setting');
                } else if (input.toLowerCase().includes('gothic') || input.toLowerCase().includes('dark')) {
                    prompt += ', in dimly lit Victorian interior, heavy velvet curtains, antique furniture, candlelight';
                    addedElements.push('gothic interior setting');
                } else {
                    prompt += ', in minimalist studio space, neutral backdrop, soft natural window light';
                    addedElements.push('studio setting');
                }
            } else {
                // Enhance the location they specified
                if (analysis.detectedLocation === 'workshop') {
                    prompt += ', concrete floors, exposed brick walls, metal shavings on ground, industrial lighting';
                    addedElements.push('workshop details');
                }
            }
            
            // Only add wardrobe if user didn't specify clothes
            if (!analysis.hasWardrobe) {
                // Suggest wardrobe based on aesthetic
                if (input.toLowerCase().includes('metalsmith') || input.toLowerCase().includes('industrial')) {
                    prompt += ', wearing distressed leather apron over black tank top, heavy work boots, fingerless gloves';
                    addedElements.push('workshop attire');
                } else if (input.toLowerCase().includes('gothic')) {
                    prompt += ', wearing deconstructed black linen dress, torn fishnet stockings, heavy silver jewelry';
                    addedElements.push('gothic outfit');
                } else {
                    prompt += ', wearing casual contemporary clothing';
                    addedElements.push('basic outfit');
                }
            }
            
            // Only add pose if user didn't specify action
            if (!analysis.hasPose) {
                prompt += ', standing in confident pose, natural posture';
                addedElements.push('posing direction');
            }
            
            // Always add technical specs at the end
            prompt += ', editorial photography, 85mm lens, f/1.8, dramatic lighting, high contrast, photorealistic, 8k resolution, professional color grading';
            addedElements.push('camera/technical specs');
            
            // Display
            document.getElementById('results').classList.remove('hidden');
            document.getElementById('output').value = prompt;
            
            // Show what was preserved vs added
            document.getElementById('userTags').innerHTML = `<span class="tag px-3 py-1.5 rounded-lg text-xs text-gray-300">Your full creative direction</span>`;
            
            document.getElementById('addedTags').innerHTML = addedElements.map(e => 
                `<span class="tag px-3 py-1.5 rounded-lg text-xs text-green-400 border-green-400/30">${e}</span>`
            ).join('');
        }

        function copyToClipboard() {
            const copyText = document.getElementById("output");
            const copyBtn = document.getElementById("copyBtn");
            
            copyText.select();
            copyText.setSelectionRange(0, 99999);
            
            navigator.clipboard.writeText(copyText.value).then(function() {
                copyBtn.innerHTML = `<span class="text-green-400">Copied!</span>`;
                setTimeout(() => {
                    copyBtn.innerHTML = `
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path>
                        </svg>
                        Copy
                    `;
                }, 2000);
            });
        }
    </script>
</body>
</html>
